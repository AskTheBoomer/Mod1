name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Mod3-Unit-Testing-Listing-Status-Updates

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: TradeSpace-Automated-Testing/pom.xml

      - name: Build project
        run: mvn clean package

      - name: Run unit tests
        run: mvn test
